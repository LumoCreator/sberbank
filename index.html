<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оформление карты</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Устанавливаем фоновое изображение */
            background-image: url('https://raw.githubusercontent.com/LumoCreator/sberbank/refs/heads/main/default_greeting_image.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: sans-serif;
        }

        .text-container {
            /* Полупрозрачная подложка, чтобы текст было лучше видно на любом фото */
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px 40px;
            border-radius: 10px;
        }

        h1 {
            color: white;
            margin: 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="text-container">
        <h1>Попросите создателя оформить Вам карту.</h1>
    </div>

</body>
</html>
